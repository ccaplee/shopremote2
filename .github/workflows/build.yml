name: Build ShopRemote2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++ gcc git curl wget \
          clang cmake pkg-config nasm yasm \
          zip unzip tar autoconf automake libtool \
          libunwind-dev \
          libgtk-3-dev \
          libxcb-randr0-dev libxdo-dev libxfixes-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          libasound2-dev libpulse-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          libpam0g-dev \
          libappindicator3-dev \
          libclang-dev \
          libva-dev libvdpau-dev \
          libopus-dev \
          libxrandr-dev \
          libdbus-1-dev \
          python3

    - name: Setup vcpkg and install packages
      run: |
        export VCPKG_ROOT="$HOME/vcpkg"
        git clone https://github.com/Microsoft/vcpkg.git "$VCPKG_ROOT"
        "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
        "$VCPKG_ROOT/vcpkg" install libyuv libvpx aom --triplet x64-linux
        echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release

    - name: Check
      run: cargo check
