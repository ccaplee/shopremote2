name: Build ShopRemote2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang cmake pkg-config nasm yasm curl wget \
          libunwind-dev \
          libgtk-3-dev \
          libxcb-randr0-dev libxdo-dev libxfixes-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          libasound2-dev libpulse-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          libpam0g-dev \
          libappindicator3-dev \
          libclang-dev \
          libva-dev libvdpau-dev \
          libopus-dev \
          libvpx-dev \
          libaom-dev \
          libxrandr-dev \
          libdbus-1-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'a1a1cbc975e3ff75b3b3d0b3dd9a3c2c8c5c5e5c'
        runVcpkgInstall: false

    - name: Install vcpkg packages
      run: |
        if [ ! -d "$VCPKG_ROOT" ]; then
          git clone https://github.com/Microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh
          export VCPKG_ROOT=/tmp/vcpkg
        fi
        $VCPKG_ROOT/vcpkg install libyuv libvpx aom --triplet x64-linux
        echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release

    - name: Check
      run: cargo check
